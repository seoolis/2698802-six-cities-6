services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "${DB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-test}
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
